# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 4
  
  col.active_border = $color12 
  col.inactive_border = $color10
}

decoration {
  rounding = 10
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    color =  $color12
    color_inactive = $color10
  }


  blur {
    enabled = true	
    size = 6
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
  }
}

group {
  # Bordes del grupo cuando está activo/inactivo
  col.border_active = $color15      # Color del borde cuando el grupo está activo
  col.border_inactive = $color10    # Color del borde cuando el grupo está inactivo
  col.border_locked_active = $color12    # Color del borde cuando está bloqueado y activo
  col.border_locked_inactive = $color11  # Color del borde cuando está bloqueado e inactivo
  
  groupbar {
    enabled = true                # true = mostrar barra | false = ocultar barra
    
    # --- TAMAÑO Y DIMENSIONES ---
    font_size = 14                # Tamaño del texto en px (default: 8, rango: 8-20) # Ejemplo: 10 = pequeño, 14 = mediano, 18 = grande
    height = 13                   # Altura de la barra en px (default: 14, rango: 10-30) Ejemplo: 12 = delgada, 16 = normal, 20 = gruesa
    priority = 3                  # Prioridad de renderizado (default: 3, rango: 0-10) Controla el orden Z de la barra respecto a otros elementos
    
    # --- COMPORTAMIENTO ---
    render_titles = true          # true = mostrar títulos de ventanas | false = solo íconos Si es false, solo mostrará indicadores de ventanas
    scrolling = true              # true = scroll entre pestañas | false = sin scroll Permite usar la rueda del mouse para cambiar de pestaña
    
    # --- COLORES DE TEXTO ---
    text_color = $color15         # Color del texto en pestañas (hexadecimal o variable) Ejemplo: 0xFFFFFFFF = blanco, 0xFF000000 = negro
    
    # --- COLORES DE FONDO DE LAS PESTAÑAS ---
    col.active = $color17         # Color de fondo de la pestaña activa Esta es la pestaña que está actualmente enfocada
    col.inactive = $color18       # Color de fondo de pestañas inactivas Pestañas que no están enfocadas pero están en el grupo
    col.locked_active = $color13  # Color cuando la pestaña activa está bloqueada Bloqueado = el grupo no permite cambios
    col.locked_inactive = $color14 # Color cuando pestañas inactivas están bloqueadas
  }
}
