# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# settings for User defaults apps - set your default terminal and file manager on this file
source= $UserConfigs/01-UserDefaults.conf

# common shortcuts
#bindr = $mainMod, $mainMod_L, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Super Key to Launch rofi menu
bind = $mainMod, SPACE, exec, qs ipc call applauncher toggle  # App Launcher (QS)
bind = $mainMod, F, exec, MOZ_ENABLE_WAYLAND=1 firefox  # Firefox browser
# bind = $mainMod SHIFT, F, exec, pkill firefox  # Force close Firefox
# bind = $mainMod, W, exec, $UserScripts/OpenWhatsApp.sh # Open WhatsApp in Firefox and focus (ORIGINAL BASH - COMENTADO)
bind = $mainMod, W, exec, $UserScripts/whatsapp-launcher-rs/target/release/whatsapp-launcher # Open WhatsApp in Firefox and focus (RUST - OPTIMIZED & BUG FIXED)
# bind = $mainMod SHIFT, W, exec, $UserScripts/WallpaperEffects.sh # Wallpaper Effects by imagemagick

# bind = $mainMod, tab, global, quickshell:overviewToggle # desktop overview (if installed)
bind = ALT, F4, killactive # Cierra la ventana activa (Alt+F4 clásico)

# Alt+Tab functionality for window switching
bind = ALT, tab, workspace, e+1 #kiss Keep It Simple, Stupid
bind = $mainMod, tab, exec, qs ipc call windowswitcher toggle  # Selector de ventanas (Win+Tab)

bind = $mainMod, Return, exec, $term  #terminal
bind = $mainMod SHIFT, Return, exec, $term --class floating-term  #terminal flotante
bind = $mainMod, E, exec, $files #file manager

# FEATURES / EXTRAS
bind = $mainMod, H, exec, $scriptsDir/KeyHints.sh # help / cheat sheet
bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh # Refresh waybar, swaync, rofi
bind = $mainMod ALT, E, exec, $scriptsDir/RofiEmoji.sh # emoji menu
# bind = $mainMod, S, exec, $scriptsDir/RofiSearch.sh # Google search using rofi
bind = $mainMod ALT, O, exec, $scriptsDir/ChangeBlur.sh # Toggle blur settings 
bind = $mainMod, G, exec, $scriptsDir/GMnew toggle # Hybrid GameMode (same toggle as Quickshell)
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh # Toggle Master or Dwindle Layout
bind = $mainMod ALT, V, exec, $scriptsDir/ClipManager.sh # Clipboard Manager
bind = $mainMod CTRL, R, exec, $scriptsDir/RofiThemeSelector.sh # KooL Rofi Menu Theme Selector
bind = $mainMod CTRL SHIFT, R, exec, pkill rofi || true && $scriptsDir/RofiTRhemeSelector-modified.sh # modified Rofi Theme Selector

bind = $mainMod SHIFT, F, fullscreen # whole full screen
bind = $mainMod CTRL, F, fullscreen, 1 # fake full screen
bind = $mainMod SHIFT, SPACE, togglefloating, #Float Mode
# bind = $mainMod ALT, SPACE, exec, hyprctl dispatch workspaceopt allfloat #All Float Mode
bind = $mainMod ALT, SPACE, exec, $scriptsDir/Dropterminal.sh $term # Dropdown terminal

# Desktop zooming or magnifier
bind = $mainMod ALT, mouse_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bind = $mainMod ALT, mouse_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" 

## NOTES for ja (Hyprland version 0.39 (Ubuntu 24.04))
#bind = $mainMod ALT, mouse_down, exec, hyprctl keyword misc:cursor_zoom_factor "$(hyprctl getoption misc:cursor_zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
#bind = $mainMod ALT, mouse_up, exec, hyprctl keyword misc:cursor_zoom_factor "$(hyprctl getoption misc:cursor_zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" 

# Waybar / Bar related
bind = $mainMod, J, exec, pkill -SIGUSR1 waybar # Toggle hide/show waybar 
bind = $mainMod CTRL, B, exec, $scriptsDir/WaybarStyles.sh # Waybar Styles Menu
bind = $mainMod ALT, B, exec, $scriptsDir/WaybarLayout.sh # Waybar Layout Menu

# FEATURES / EXTRAS (UserScripts)
bind = $mainMod, M, exec, $UserScripts/RofiBeats.sh # online music using rofi
bind = $mainMod, B, exec, $UserScripts/RofiSSH.sh # online music using rofi
bind = $mainMod CTRL, W, exec, qs ipc call wallpaperpicker toggle # WallpaperPicker (QS)
bind = CTRL ALT, W, exec, $UserScripts/WallpaperRandom.sh # Random wallpapers
bind = $mainMod ALT, W, exec, $UserScripts/WallpaperRandom.sh # Random wallpaper (atajo adicional)
bind = $mainMod SHIFT, W, exec, $UserScripts/WallpaperNext.sh # Next wallpaper (quick)
bind = $mainMod SHIFT CTRL, Right, exec, [ -f /tmp/wallpaper_auto_change_mixed.pid ] && kill -USR1 $(cat /tmp/wallpaper_auto_change_mixed.pid) # Saltar al siguiente wallpaper (auto-cambio)
bind = $mainMod CTRL, O, exec, hyprctl setprop active opaque toggle # disable opacity on active window
bind = $mainMod SHIFT, K, exec, $scriptsDir/KeyBinds.sh # search keybinds via rofi
bind = $mainMod SHIFT, A, exec, $scriptsDir/Animations.sh #hyprland animations menu
# bind = $mainMod SHIFT, O, exec, $UserScripts/ZshChangeTheme.sh # Change oh-my-zsh theme GNZH
bindln = ALT, SPACE, exec, $scriptsDir/SwitchKeyboardLayout.sh # Change keyboard layout globally
# bindln = SHIFT_L, ALT_L, exec, $scriptsDir/Tak0-Per-Window-Switch.sh # Change keyboard layout locally for each window
bind = $mainMod ALT, C, exec, $UserScripts/RofiCalc.sh # calculator (qalculate)

# Panel de Control y Notificaciones
bind = $mainMod, K, exec, ~/.config/waybar/scripts/toggle-audio-mixer.sh # Toggle Panel de Control
bind = $mainMod, N, exec, swaync-client -t -sw # Toggle Notificaciones (SwayNC)

# Navigate between workspaces with mainMod + arrow keys
bind = $mainMod, left, workspace, r-1  # Move to previous workspace
bind = $mainMod, right, workspace, r+1  # Move to next workspace
bind = $mainMod, up, workspace, r-1    # Move to previous workspace (alternative)
bind = $mainMod, down, workspace, r+1  # Move to next workspace (alternative)

# Navigate between windows in current workspace with mainMod + Alt + arrow keys
bind = $mainMod ALT, left, movefocus, l   # Focus window to the left
bind = $mainMod ALT, right, movefocus, r  # Focus window to the right
bind = $mainMod ALT, up, movefocus, u     # Focus window above
bind = $mainMod ALT, down, movefocus, d   # Focus window below

# Move windows to other workspaces with mainMod + Ctrl + arrow keys
bind = $mainMod CTRL, left, movetoworkspace, r-1   # Move window to previous workspace
bind = $mainMod CTRL, right, movetoworkspace, r+1  # Move window to next workspace
bind = $mainMod CTRL, up, movetoworkspace, r-1     # Move window to previous workspace (alternative)
bind = $mainMod CTRL, down, movetoworkspace, r+1   # Move window to next workspace (alternative)

# Move windows position with mainMod + Ctrl + Alt + arrow keys
bind = $mainMod CTRL ALT, left, movewindow, l   # Move window to the left
bind = $mainMod CTRL ALT, right, movewindow, r  # Move window to the right
bind = $mainMod CTRL ALT, up, movewindow, u     # Move window up
bind = $mainMod CTRL ALT, down, movewindow, d   # Move window down

# Move/resize windows with mainMod + mouse click and dragging
bindm = $mainMod, mouse:272, movewindow # Move windows with mainMod + left click
bindm = $mainMod, mouse:273, resizewindow # Resize windows with mainMod + right click

# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset

# /* ---- 🔄 Scrolling Layout Controls (WS5) ---- */  #
# Navegar entre ventanas en la fila (izquierda/derecha)
bind = $mainMod, mouse_down, movefocus, l   # Enfoque a la ventana de la izquierda
bind = $mainMod CTRL SHIFT, left, movefocus, l   # Enfoque a la ventana de la izquierda

bind = $mainMod, mouse_up, movefocus, r  # Enfoque a la ventana de la derecha
bind = $mainMod CTRL SHIFT, right, movefocus, r  # Enfoque a la ventana de la derecha

# Ajustar ancho de la columna actual
bind = $mainMod CTRL SHIFT, greater, layoutmsg, colresize +0.1   # Hacer más ancha
bind = $mainMod CTRL SHIFT, less, layoutmsg, colresize -0.1    # Hacer más angosta

# Promover ventana a columna nueva
bind = $mainMod CTRL SHIFT, P, layoutmsg, promote

# Alternar modo de vista (centrar o encajar)
bind = $mainMod CTRL SHIFT, F, layoutmsg, togglefit

# Captura de pantalla (módulo screenshot de quickshell)
# Win+Shift+S → abre captura; dentro hay botón para grabar pantalla
bind = $mainMod SHIFT, S, exec, qs ipc call screenshot toggle
